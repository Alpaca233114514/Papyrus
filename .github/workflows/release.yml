name: Release with Changelog

on:
  push:
    branches:
      - main
      - develop
      - release/**
      - v2
      - v2-develop
      - v2.0.0beta*
      - 'v2*'
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v2.0.0)'
        required: true
        type: string
      draft:
        description: 'Create as draft'
        default: true
        type: boolean

env:
  APP_NAME: "Papyrus"
  # 使用 Node.js 24，避免 Node.js 20 弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Electron Builder 二进制工具镜像（签名工具等）
  ELECTRON_BUILDER_BINARIES_MIRROR: "https://npmmirror.com/mirrors/electron-builder-binaries/"
  # Electron 镜像
  ELECTRON_MIRROR: "https://npmmirror.com/mirrors/electron/"

jobs:
  build:
    name: Build ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows"
            os: windows-latest
            artifact: "Papyrus-Win-x64"
          - platform: "macos"
            os: macos-latest
            artifact: "Papyrus-Apple-Silicon-arm64"
          - platform: "linux"
            os: ubuntu-latest
            artifact: "Papyrus-Linux-x64"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            frontend/package-lock.json

      - name: Install Dependencies
        run: |
          npm install
          cd frontend && npm install

      - name: Build Frontend
        run: |
          cd frontend
          npm run build

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'  

      - name: Run Tests & Verify Accuracy
        run: |
          pip install pytest pytest-asyncio httpx
          pip install -r requirements.txt
          PYTHONPATH=src python scripts/verify-tests.py

      - name: Build Python Backend
        run: |
          pip install pyinstaller
          pip install -r requirements.txt
          pyinstaller PapyrusAPI.spec --clean --distpath dist-python

      - name: Verify Python Build
        shell: bash
        run: |
          # PyInstaller one-file mode: executable is directly in dist-python/
          if [ "${{ matrix.platform }}" = "windows" ]; then
            EXECUTABLE="dist-python/Papyrus.exe"
          else
            EXECUTABLE="dist-python/Papyrus"
          fi
          
          if [ ! -f "$EXECUTABLE" ]; then
            echo "❌ Error: Python executable not found at $EXECUTABLE"
            echo "Contents of dist-python/:"
            ls -la dist-python/ || echo "dist-python directory does not exist"
            exit 1
          fi
          
          # Check executable size (should be > 15MB)
          SIZE_MB=$(du -m "$EXECUTABLE" | cut -f1)
          echo "✅ Python executable built: $EXECUTABLE (${SIZE_MB}MB)"
          
          if [ "$SIZE_MB" -lt 15 ]; then
            echo "❌ Error: Executable size too small (${SIZE_MB}MB), build may be incomplete"
            exit 1
          fi
          
          # Test executable can start (check version/help)
          echo "Testing executable..."
          if ! "$EXECUTABLE" --version 2>/dev/null && ! "$EXECUTABLE" --help 2>/dev/null; then
            echo "⚠️ Warning: Executable may not run correctly (no --version or --help support)"
          fi

      - name: Build Electron App
        run: npx electron-builder --${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify Electron Build
        shell: bash
        run: |
          RESOURCES_DIR=""
          EXPECTED_FILES=(
            "app.asar"
            "assets/icon.ico"
            "assets/icon.png"
            "certs/root-ca.cer"
            "python/Papyrus.exe"
          )
          
          # Determine resources directory based on platform
          if [ "${{ matrix.platform }}" = "windows" ]; then
            RESOURCES_DIR="dist-electron/win-unpacked/resources"
            EXPECTED_FILES+=(
              "../Papyrus.exe"
              "../chrome_100_percent.pak"
              "../ffmpeg.dll"
            )
          elif [ "${{ matrix.platform }}" = "macos" ]; then
            APP_NAME="dist-electron/mac/Papyrus.app"
            RESOURCES_DIR="${APP_NAME}/Contents/Resources"
            EXPECTED_FILES+=(
              "../MacOS/Papyrus"
            )
          else
            # Linux
            RESOURCES_DIR="dist-electron/linux-unpacked/resources"
            EXPECTED_FILES+=(
              "../papyrus"
            )
          fi
          
          echo "Checking resources directory: $RESOURCES_DIR"
          
          # Check resources directory exists
          if [ ! -d "$RESOURCES_DIR" ]; then
            echo "❌ Error: Resources directory not found: $RESOURCES_DIR"
            echo "Contents of dist-electron/:"
            find dist-electron/ -type f -name "*" 2>/dev/null | head -30 || echo "dist-electron/ not found"
            exit 1
          fi
          
          # Verify each expected file
          FAILED=0
          for file in "${EXPECTED_FILES[@]}"; do
            FULL_PATH="$RESOURCES_DIR/$file"
            if [ -f "$FULL_PATH" ]; then
              SIZE=$(du -h "$FULL_PATH" 2>/dev/null | cut -f1)
              echo "✅ $file ($SIZE)"
            else
              echo "❌ MISSING: $file"
              FAILED=$((FAILED + 1))
            fi
          done
          
          if [ $FAILED -gt 0 ]; then
            echo ""
            echo "❌ Error: $FAILED required files missing!"
            echo "Actual contents of $RESOURCES_DIR:"
            find "$RESOURCES_DIR" -type f 2>/dev/null | head -50
            exit 1
          fi
          
          echo ""
          echo "✅ All required files present in Electron build"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist-electron/*
          retention-days: 7

  release:
    name: Create Release with Changelog
    needs: build
    runs-on: ubuntu-latest
    # 发布 job - 仅在打标签时启用
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for changelog

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Extract Changelog
        id: changelog
        run: |
          # Get version from tag or input
          VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${VERSION#v}"  # Remove 'v' prefix if present
          
          echo "Extracting changelog for version: $VERSION"
          
          # Run extraction script
          node scripts/extract-changelog.js "$VERSION" >> $GITHUB_OUTPUT
          
          # Also save to file for debugging
          echo "=== Extracted Changelog ==="
          cat RELEASE_NOTES.md
          echo "==========================="

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: Papyrus-*

      - name: List Artifacts
        run: |
          echo "Build artifacts:"
          find artifacts/ -type f -name "*" | sort

      - name: Determine Release Type
        id: release_type
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          
          if [[ "$TAG" == *"alpha"* ]] || [[ "$TAG" == *"beta"* ]] || [[ "$TAG" == *"rc"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi
          
          echo "Tag: $TAG"
          echo "Is Prerelease: ${{ steps.release_type.outputs.is_prerelease }}"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Papyrus-Win-x64/**/*-Setup-*.exe
            artifacts/Papyrus-Apple-Silicon-arm64/**/*.dmg
            artifacts/Papyrus-Apple-Silicon-arm64/**/*.zip
            artifacts/Papyrus-Linux-x64/**/*.AppImage
            artifacts/Papyrus-Linux-x64/**/*.deb
            artifacts/Papyrus-Linux-x64/**/*.tar.gz
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          body_path: RELEASE_NOTES.md
          draft: ${{ github.event.inputs.draft != 'false' }}
          prerelease: ${{ steps.release_type.outputs.is_prerelease == 'true' }}
          generate_release_notes: false  # We use our own changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Changelog as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md
