<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 15px 0;
      color: #333;
    }
    .status {
      padding: 8px 12px;
      border-radius: 4px;
      margin-bottom: 15px;
      font-size: 13px;
    }
    .status.connected {
      background: #d4edda;
      color: #155724;
    }
    .status.disconnected {
      background: #f8d7da;
      color: #721c24;
    }
    button {
      width: 100%;
      padding: 10px;
      margin-bottom: 8px;
      border: none;
      border-radius: 4px;
      background: #0066cc;
      color: white;
      cursor: pointer;
      font-size: 13px;
    }
    button:hover {
      background: #0052a3;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .result {
      margin-top: 10px;
      padding: 8px;
      background: #f8f9fa;
      border-radius: 4px;
      font-size: 12px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>📝 Papyrus 扩展</h1>
  
  <div id="status" class="status disconnected">
    检查连接中...
  </div>
  
  <button id="btnClipPage" disabled>📄 保存当前页面</button>
  <button id="btnClipSelection" disabled>📌 保存选中内容</button>
  <button id="btnQuickNote" disabled>⚡ 快速笔记</button>
  <button id="btnListNotes" disabled>📋 查看笔记列表</button>
  
  <div id="result" class="result" style="display: none;"></div>
  
  <script src="popup.js"></script>
</body>
</html>
